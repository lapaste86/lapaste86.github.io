<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La_Paste</title>
    <!-- Font Awesome untuk ikon (opsional, mempercantik) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .welcome-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 3rem 2rem;
            max-width: 900px;
            width: 100%;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .welcome-container:hover {
            transform: scale(1.02);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        /* Animasi untuk ikon/header */
        .welcome-icon {
            font-size: 5rem;
            color: #667eea;
            margin-bottom: 1rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #4a5568;
            margin-bottom: 2rem;
            font-weight: 300;
            border-bottom: 2px dashed #e2e8f0;
            padding-bottom: 1.5rem;
        }

        .description {
            color: #2d3748;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2.5rem;
            padding: 0 1rem;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin: 2.5rem 0;
        }

        .feature-item {
            flex: 1 1 150px;
            background: #f7fafc;
            padding: 1.5rem 1rem;
            border-radius: 1.5rem;
            transition: all 0.3s ease;
            border: 1px solid #edf2f7;
        }

        .feature-item:hover {
            background: white;
            border-color: #667eea;
            transform: translateY(-8px);
            box-shadow: 0 15px 30px -10px rgba(102, 126, 234, 0.4);
        }

        .feature-item i {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.75rem;
        }

        .feature-item span {
            display: block;
            font-weight: 600;
            color: #2d3748;
            font-size: 1rem;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin: 2rem 0 1.5rem;
        }

        .custom-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.5);
            letter-spacing: 0.5px;
            min-width: 220px;
        }

        .custom-button i {
            font-size: 1.3rem;
        }

        .custom-button:hover {
            background: linear-gradient(135deg, #5a67d8, #6b46a1);
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -8px rgba(102, 126, 234, 0.7);
        }

        .custom-button:active {
            transform: translateY(0);
        }

        .verdik-button {
            background: linear-gradient(135deg, #38a169, #2f855a);
            box-shadow: 0 10px 20px -5px rgba(56, 161, 105, 0.5);
        }

        .verdik-button:hover {
            background: linear-gradient(135deg, #2f855a, #276749);
        }

        .absen-button {
            background: linear-gradient(135deg, #ecc94b, #d69e2e);
            box-shadow: 0 10px 20px -5px rgba(236, 201, 75, 0.5);
        }

        .absen-button:hover {
            background: linear-gradient(135deg, #d69e2e, #b7791f);
        }

        /* Tombol baru untuk Konversi Data Salur */
        .dalur-button {
            background: linear-gradient(135deg, #f56565, #c53030);
            box-shadow: 0 10px 20px -5px rgba(245, 101, 101, 0.5);
        }

        .dalur-button:hover {
            background: linear-gradient(135deg, #e53e3e, #9b2c2c);
        }

        .footer-note {
            margin-top: 2rem;
            color: #718096;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .footer-note i {
            color: #fc8181;
        }

        /* Responsif untuk layar kecil */
        @media (max-width: 700px) {
            .welcome-container {
                padding: 2rem 1rem;
            }
            h1 {
                font-size: 2.2rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .feature-item {
                flex: 1 1 100%;
            }
            .button-group {
                flex-direction: column;
                align-items: center;
            }
            .custom-button {
                width: 100%;
                max-width: 300px;
            }
        }

        /* efek partikel sederhana (opsional) */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <!-- Hiasan background dot / partikel (opsional) -->
    <div class="bg-particles"></div>

    <div class="welcome-container">
        <!-- Ikon animasi (tangan wave) -->
        <div class="welcome-icon">
            <i class="fas fa-hand-sparkles"></i>
        </div>

        <!-- Judul Selamat Datang (akan diupdate dengan sapaan oleh JS) -->
        <h1>Selamat Datang!</h1>
        <div class="subtitle">
            <i class="fas fa-map-pin" style="color: #667eea;"></i> 
            Senang melihat Anda di sini
        </div>

        <!-- GROUP TOMBOL: VerDik, Absensi eSDM, dan Data Salur -->
        <div class="button-group">
            <!-- Tombol VerDik -->
            <a href="https://lapaste86.github.io/verdik.html" class="custom-button verdik-button" target="_blank" rel="noopener noreferrer">
                <i class="fas fa-gavel"></i> 
                Form Verifikasi Pendidikan
            </a>
            
            <!-- Tombol Absensi eSDM -->
            <a href="https://lapaste86.github.io/konsen.html" class="custom-button absen-button" target="_blank" rel="noopener noreferrer">
                <i class="fas fa-calendar-check"></i> 
                Konversi Absensi eSDM
            </a>

            <!-- Tombol Konversi Data Salur (baru) -->
            <a href="https://lapaste86.github.io/dalur.html" class="custom-button dalur-button" target="_blank" rel="noopener noreferrer">
                <i class="fas fa-database"></i> 
                Konversi Data Salur
            </a>
        </div>

        <!-- FOOTER DENGAN TEKS LA_PASTE DAN TAHUN OTOMATIS -->
        <div class="footer-note">
            <i class="fas fa-code"></i> La_Paste 
            <i class="fas fa-copyright" style="font-size: 0.8rem;"></i> 
            <span id="currentYear"></span>
        </div>
    </div>

    <!-- JavaScript sederhana untuk menyapa sesuai waktu (opsional) -->
    <script>
        (function() {
            // Menyapa berdasarkan waktu untuk sentuhan personal
            const now = new Date();
            const hour = now.getHours();
            let greeting = "Selamat Datang"; // default

            if (hour >= 3 && hour < 11) {
                greeting = "Selamat Pagi";
            } else if (hour >= 11 && hour < 15) {
                greeting = "Selamat Siang";
            } else if (hour >= 15 && hour < 18) {
                greeting = "Selamat Sore";
            } else {
                greeting = "Selamat Malam";
            }

            // Update judul h1 dengan sapaan
            const titleElement = document.querySelector('h1');
            if (titleElement) {
                titleElement.innerHTML = `${greeting}!`;
            }

            // Set tahun otomatis di footer
            const yearSpan = document.getElementById('currentYear');
            if (yearSpan) {
                yearSpan.textContent = now.getFullYear();
            }

            // Catatan kecil di console (bukan alert)
            console.log("Catatan: Link VerDik (https://lapaste86.github.io/verdik.html) mengembalikan status 404 berdasarkan pengecekan sebelumnya. Pastikan URL sudah benar.");
        })();
    </script>

    <style>
        /* Membuat efek titik-titik di belakang (simple) */
        .bg-particles {
            background-image: radial-gradient(rgba(255,255,255,0.2) 1px, transparent 1px);
            background-size: 50px 50px;
        }
    </style>
</body>
</html>
